<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yichen Wei profile banner</title>
  <desc id="desc">A geometric banner combining machine learning nodes, computer vision rays, and a robotics arm.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="30" x2="1120" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#123C69"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="40" x2="960" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.75 0 0 0 0 1 0 0 0 0.4 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="330" rx="28" fill="url(#bg)"/>
  <path d="M0 250C130 210 220 296 370 246C520 196 570 75 750 98C930 121 1000 236 1200 185V330H0V250Z" fill="#020617" opacity="0.42"/>
  <path d="M100 58C250 24 390 34 520 88C665 148 790 36 930 56C1035 71 1110 122 1200 88" stroke="url(#accent)" stroke-width="2" opacity="0.45"/>
  <path d="M86 274C221 222 348 286 480 234C615 181 670 132 820 152C978 173 1026 268 1160 230" stroke="#67E8F9" stroke-width="1.5" opacity="0.3"/>

  <g opacity="0.9" filter="url(#softGlow)">
    <circle cx="126" cy="90" r="7" fill="#38BDF8"/>
    <circle cx="205" cy="140" r="7" fill="#A78BFA"/>
    <circle cx="154" cy="211" r="7" fill="#34D399"/>
    <circle cx="272" cy="228" r="7" fill="#38BDF8"/>
    <circle cx="315" cy="94" r="7" fill="#A78BFA"/>
    <path d="M126 90L205 140L154 211L272 228L205 140L315 94L126 90Z" stroke="#E0F2FE" stroke-width="2" opacity="0.65"/>
    <path d="M154 211L126 90M315 94L272 228" stroke="#E0F2FE" stroke-width="1.5" opacity="0.35"/>
  </g>

  <g transform="translate(858 78)" opacity="0.92">
    <circle cx="72" cy="72" r="58" stroke="#BAE6FD" stroke-width="2" opacity="0.35"/>
    <circle cx="72" cy="72" r="8" fill="#F8FAFC"/>
    <path d="M72 72L140 44" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round"/>
    <path d="M140 44L190 86" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round"/>
    <circle cx="140" cy="44" r="12" fill="#38BDF8"/>
    <circle cx="190" cy="86" r="12" fill="#34D399"/>
    <path d="M190 86L220 72M190 86L218 104" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>
    <path d="M54 142H112" stroke="#A7F3D0" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g opacity="0.52">
    <path d="M650 48L760 118L720 216L604 196L568 100L650 48Z" stroke="#C4B5FD" stroke-width="2"/>
    <path d="M650 48L720 216M760 118L604 196M568 100L720 216" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="650" cy="48" r="5" fill="#C4B5FD"/>
    <circle cx="760" cy="118" r="5" fill="#C4B5FD"/>
    <circle cx="720" cy="216" r="5" fill="#C4B5FD"/>
    <circle cx="604" cy="196" r="5" fill="#C4B5FD"/>
    <circle cx="568" cy="100" r="5" fill="#C4B5FD"/>
  </g>

  <text x="80" y="135" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Yichen Wei</text>
  <text x="82" y="178" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Machine Learning | Computer Vision | Robotics</text>
  <text x="82" y="215" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Building reproducible experiments from mathematical models, perception, and control.</text>
</svg>
